name: Freshdesk Email KB Automation

on:
  repository_dispatch:
    types:
      - freshdesk_ticket_created
  schedule:
    # GitHub-hosted cron is the current unattended trigger path.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: freshdesk-email-kb-automation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run responder
        env:
          FRESHDESK_API_KEY: ${{ secrets.FRESHDESK_API_KEY }}
          FRESHDESK_DOMAIN: soulshineai
          TARGET_TICKET_ID: ${{ github.event.client_payload.ticket_id }}
        run: python responder.py once

      - name: Commit state and KB cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workfiles/email_ai_responder_state.json workfiles/email_ai_responder_kb_cache.json
          git diff --cached --quiet && exit 0
          git commit -m "Update responder state"
          git push
