name: Freshdesk Weekly Metrics

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  repository_dispatch:
    types:
      - freshdesk_weekly_metrics_run

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: freshdesk-weekly-metrics
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build weekly metrics and publish Freshdesk article
        env:
          FRESHDESK_API_KEY: ${{ secrets.FRESHDESK_API_KEY }}
          FRESHDESK_DOMAIN: soulshineai
          INTERNAL_REPORTS_FOLDER_ID: "68000041131"
        run: python weekly_metrics.py

      - name: Commit weekly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workfiles/reports/
          git diff --cached --quiet && exit 0
          git commit -m "Add weekly metrics snapshot"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git pull --rebase origin main
          done
          exit 1
